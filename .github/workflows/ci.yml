name: Flutter CI

on:
  push:
    branches: [ "main", "dev", "staging" ]
  pull_request:
    branches: [ "main", "dev", "staging" ]

jobs:
  flutter-test:
    runs-on:
      group: FlutterFrontEnd
    steps:
      - uses: actions/checkout@v4

      - name: Set Flutter channel
        run: |
          flutter channel stable
          flutter upgrade

      - name: Get dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test --coverage